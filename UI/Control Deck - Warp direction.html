<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Control Deck — Warp direction</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Inter:wght@400;500;600&family=Inter+Tight:wght@400;500;600&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/app.css">
<link rel="stylesheet" href="styles/panes.css">
<style>
  /* streaming cursor */
  .cursor { display:inline-block; width:7px; background: var(--accent); margin-left:2px; animation: pulseSoft 0.9s ease-in-out infinite; }
  /* viz chart label overlay */
  .viz-chart-label {
    position: relative; z-index: 3;
    display: flex; justify-content: space-between;
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--fg-dim);
  }
  .viz-chart-label + * { position: relative; z-index: 3; }
</style>
</head>
<body>

<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/Icons.jsx"></script>
<script type="text/babel" src="components/Viz.jsx"></script>
<script type="text/babel" src="components/SessionData.jsx"></script>
<script type="text/babel" src="components/useFakeRun.jsx"></script>
<script type="text/babel" src="components/Shell.jsx"></script>
<script type="text/babel" src="components/V1Safe.jsx"></script>
<script type="text/babel" src="components/V2Dossier.jsx"></script>
<script type="text/babel" src="components/V3Tower.jsx"></script>
<script type="text/babel" src="components/ModelsPane.jsx"></script>
<script type="text/babel" src="components/RunsPane.jsx"></script>
<script type="text/babel" src="components/ToolsPane.jsx"></script>
<script type="text/babel" src="components/DojoPane.jsx"></script>
<script type="text/babel" src="components/ComfyPane.jsx"></script>
<script type="text/babel" src="components/VoicePane.jsx"></script>
<script type="text/babel" src="components/Tweaks.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

/*EDITMODE-BEGIN*/const TWEAK_DEFAULTS = {
  "variant": "v1",
  "warmth": "warm",
  "type": "matter",
  "accent": "amber",
  "pane": "chat"
}/*EDITMODE-END*/;

function App() {
  // persist variant + tweaks in localStorage
  const load = (k, d) => { try { return localStorage.getItem("cd_" + k) || d; } catch { return d; } };
  const save = (k, v) => { try { localStorage.setItem("cd_" + k, v); } catch {} };

  const [variant, setVariant] = useState(load("variant", TWEAK_DEFAULTS.variant));
  const [warmth,  setWarmth]  = useState(load("warmth",  TWEAK_DEFAULTS.warmth));
  const [type,    setType]    = useState(load("type",    TWEAK_DEFAULTS.type));
  const [accent,  setAccent]  = useState(load("accent",  TWEAK_DEFAULTS.accent));
  const [pane,    setPane]    = useState(load("pane",    TWEAK_DEFAULTS.pane));
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [editMode,   setEditMode]   = useState(false);

  useEffect(() => { save("variant", variant); }, [variant]);
  useEffect(() => { save("warmth",  warmth);  }, [warmth]);
  useEffect(() => { save("type",    type);    }, [type]);
  useEffect(() => { save("accent",  accent);  }, [accent]);
  useEffect(() => { save("pane",    pane);    }, [pane]);

  // apply tokens to html
  useEffect(() => {
    const h = document.documentElement;
    h.setAttribute("data-warmth", warmth);
    h.setAttribute("data-type",   type);
    h.setAttribute("data-accent", accent);
    h.setAttribute("data-variant", variant);
  }, [warmth, type, accent, variant]);

  // Edit-mode handshake
  useEffect(() => {
    const onMsg = (e) => {
      if (!e?.data?.type) return;
      if (e.data.type === "__activate_edit_mode") setEditMode(true);
      if (e.data.type === "__deactivate_edit_mode") setEditMode(false);
    };
    window.addEventListener("message", onMsg);
    window.parent?.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  // persist via host when in edit-mode
  const setTweak = (next) => {
    if (next.warmth !== undefined) setWarmth(next.warmth);
    if (next.type   !== undefined) setType(next.type);
    if (next.accent !== undefined) setAccent(next.accent);
    if (next.variant!== undefined) setVariant(next.variant);
    if (editMode) {
      window.parent?.postMessage({ type: "__edit_mode_set_keys", edits: next }, "*");
    }
  };

  const run = useFakeRun({});
  const [canvasOpen, setCanvasOpen] = useState(false);
  const [canvasArt,  setCanvasArt]  = useState(null);

  const onOpenArtifact = (a) => { setCanvasArt(a); setCanvasOpen(true); };

  // stash artifact but don't auto-open the dock — user clicks to open it
  useEffect(() => {
    if (run.artifact) setCanvasArt(run.artifact);
  }, [run.artifact]);

  // auto-demo: after 1.2s on first load, trigger a run (canvas stays closed)
  const [demoArmed, setDemoArmed] = useState(true);
  useEffect(() => {
    if (!demoArmed) return;
    const id = setTimeout(() => {
      run.run({ operations: ACTIVE_OPS, finalText: ACTIVE_RESPONSE,
                finalArtifact: { kind: "chart-delta", name: "retention_delta_90d.png", meta: "1600×900 · 184 KB" } });
      setDemoArmed(false);
    }, 1400);
    return () => clearTimeout(id);
  }, []); // once

  return (
    <>
      {/* Variant switcher */}
      <div className="variant-bar">
        <span style={{padding:"0 10px", color:"var(--fg-faint)"}}>Variant</span>
        {[
          ["v1", "Safe"],
          ["v2", "Brave"],
          ["v3", "Radical"],
        ].map(([k, l]) => (
          <button key={k} className={variant === k ? "on" : ""}
                  onClick={() => setTweak({ variant: k })}>{l}</button>
        ))}
      </div>

      {(() => {
        // Pane routing
        const isChat = pane === "chat";
        const usesThreads = isChat && variant !== "v3";

        // non-chat panes render full-bleed with just the sidebar
        if (!isChat) {
          const Pane = pane === "models" ? ModelsPane
                     : pane === "runs"   ? RunsPane
                     : pane === "tools"  ? ToolsPane
                     : pane === "dojo"   ? DojoPane
                     : pane === "comfy"  ? ComfyPane
                     : pane === "voice"  ? VoicePane
                     : null;
          return (
            <div className="app app--compact" style={{gridTemplateColumns:"220px 1fr"}}>
              <Sidebar activePane={pane} onPane={setPane} />
              <div className="main">
                {Pane ? <Pane variant={variant}/> : <div style={{padding:40, color:"var(--fg-dim)"}}>Coming soon.</div>}
              </div>
            </div>
          );
        }

        if (variant === "v3") {
          return (
            <div className="app" style={{gridTemplateColumns:"220px 1fr"}}>
              <Sidebar activePane={pane} onPane={setPane} />
              <div className="main"><V3Tower run={run} /></div>
            </div>
          );
        }

        return (
          <div className="app">
            <Sidebar activePane={pane} onPane={setPane} />
            <ThreadSidebar threads={SESSION_THREADS} activeId="t1" onSelect={()=>{}} />
            <div className="main">
              {variant === "v2"
                ? <V2Dossier run={run} onOpenArtifact={onOpenArtifact}/>
                : <V1Chat    run={run} onOpenArtifact={onOpenArtifact}/>}
            </div>
          </div>
        );
      })()}

      <CanvasDock open={canvasOpen} artifact={canvasArt} onClose={() => setCanvasOpen(false)} />

      <TweaksPanel open={tweaksOpen} onToggle={() => setTweaksOpen((o)=>!o)}
                   state={{ warmth, type, accent }}
                   setState={(n) => setTweak(n)} />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("app"));
root.render(<App />);
</script>

</body>
</html>
