<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Model Tray</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">PC Model Control</p>
          <h1>Model Tray</h1>
        </div>
        <div class="topbar-actions">
          <button id="refreshBtn" class="button secondary" type="button">Refresh</button>
          <span id="lastUpdated" class="timestamp">Not loaded</span>
        </div>
      </header>

      <section id="statusStrip" class="status-strip" aria-live="polite"></section>

      <section class="workspace">
        <aside class="provider-pane" aria-label="Providers">
          <div class="pane-head">
            <span>Loaders</span>
            <span id="providerCount" class="muted">0</span>
          </div>
          <div id="providerList" class="provider-list"></div>
        </aside>

        <section class="model-pane" aria-label="Models">
          <div class="pane-head model-pane-head">
            <div>
              <span id="selectedProviderName">No provider</span>
              <p id="selectedProviderMeta" class="muted">Select a provider</p>
            </div>
            <label class="force-toggle">
              <input id="forceLoad" type="checkbox" />
              <span>Force guarded loads</span>
            </label>
          </div>

          <div class="toolbar">
            <input
              id="modelSearch"
              class="search"
              type="search"
              placeholder="Search models"
              autocomplete="off"
            />
            <button id="copyBaseBtn" class="button secondary" type="button" disabled>
              Copy base URL
            </button>
            <button id="startProviderBtn" class="button secondary" type="button" disabled>
              Start
            </button>
          </div>

          <div id="capabilityFilters" class="capability-filters" aria-label="Capability filters"></div>
          <div id="endpointList" class="endpoint-list"></div>
          <div id="scanPanel" class="scan-panel"></div>
          <div id="modelList" class="model-list"></div>
        </section>
      </section>

      <section class="log-pane" aria-label="Action log">
        <div class="pane-head">
          <span>Actions</span>
          <button id="clearLogBtn" class="button ghost" type="button">Clear</button>
        </div>
        <div id="actionLog" class="action-log">Ready.</div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
