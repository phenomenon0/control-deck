appId: com.controldeck.app
productName: Control Deck
copyright: Copyright © ${author}

directories:
  output: dist-electron
  buildResources: electron/resources

files:
  - ".electron-dist/**/*"
  - "!node_modules/**/*"

# Copy the Next.js standalone server + static assets into resources/app/.
# Using extraFiles (not extraResources) so files land at resources/app/ rather
# than resources/app/extra/, matching what main.ts expects. Manually copy via
# postBuild hook below because electron-builder's built-in filters strip
# nested node_modules from extraResources/extraFiles.
extraMetadata:
  name: control-deck

afterPack: scripts/electron-after-pack.cjs

asar: true
asarUnpack:
  # .node binaries cannot be loaded from inside asar archives.
  - "**/*.node"
  - "**/node_modules/node-pty/build/**"
  - "**/node_modules/better-sqlite3/build/**"
  - "**/node_modules/onnxruntime-node/bin/**"
  - "**/node_modules/@img/**"
  - "**/node_modules/koffi/build/**"
  - "**/node_modules/node-screenshots/**"

# Windows native-automation helper — staged by scripts/build-win-host.cjs
# into electron/resources/win/ during electron:build. Ships alongside
# the app so the UIA sidecar is available at runtime.
extraResources:
  - from: electron/resources/win
    to: win
    filter:
      - "WinAutomationHost.exe"

# Native deps used by the embedded Next server are pre-staged into .next/standalone
# by scripts/copy-native-binaries.cjs; no need for electron-builder to re-rebuild
# against Electron's Node ABI (N-API keeps them compatible).
npmRebuild: false
buildDependenciesFromSource: false

mac:
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/resources/entitlements.mac.plist
  entitlementsInherit: electron/resources/entitlements.mac.plist
  extendInfo:
    # macOS shows these strings in the Accessibility / Screen Recording
    # permission prompts. Without them, users see generic "Electron wants
    # to ..." text instead of app-specific copy.
    NSAccessibilityUsageDescription: >-
      Control Deck reads the accessibility tree of other apps so the agent
      can locate buttons, fill text fields, and click on your behalf.
    NSAppleEventsUsageDescription: >-
      Control Deck uses AppleScript events to raise windows and interact
      with running applications.
    NSScreenCaptureDescription: >-
      Control Deck captures your screen so the agent can reason about what
      is currently on display.

win:
  # Stable AppUserModelID so Windows identifies the app for notifications,
  # task-switcher grouping, and jump-lists. Also what child processes like
  # WinAutomationHost.exe inherit for taskbar identity.
  appUserModelId: com.controldeck.app
  target:
    - nsis
  signAndEditExecutable: true

linux:
  target:
    - AppImage
  category: Development

publish: null
